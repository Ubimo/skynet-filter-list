name: Update normalized C2 feed

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-c2-feed.yml
      - scripts/update_c2_feed.py

permissions:
  contents: read

concurrency:
  group: update-normalized-c2-feed
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download, validate and normalize feed
        run: python3 scripts/update_c2_feed.py

      - name: Commit changed feed
        shell: bash
        run: |
          set -euo pipefail
          output_file="generated/drb-ra-IPC2s-30day.ipv4"
          if git diff --quiet -- "$output_file"; then
            echo "No feed changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "$output_file"
          git commit -m "Update normalized C2 feed"
          git push origin HEAD:main
